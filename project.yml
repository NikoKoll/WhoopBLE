name: WhoopBLE
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

schemes:
  WhoopBLE:
    build:
      targets:
        WhoopBLE: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  WhoopBLE:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
    info:
      path: WhoopBLE-Info.plist
      properties:
        CFBundleDisplayName: WhoopBLE
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSBluetoothAlwaysUsageDescription: "Required to connect to your WHOOP 4.0 strap over Bluetooth."
        NSBluetoothPeripheralUsageDescription: "Required to connect to your WHOOP 4.0 strap over Bluetooth."
        NSHealthUpdateUsageDescription: "Writes heart rate and HRV from your WHOOP to Apple Health."
        NSHealthShareUsageDescription: "Reads recent heart rate history to display trends."
        NSMotionUsageDescription: "Counts your daily steps and detects sleep using iPhone motion sensors."
        UIBackgroundModes:
          - bluetooth-central
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.personal.WhoopBLE.overnight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.WhoopBLE
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 2Z848WW3KQ
        CODE_SIGN_ENTITLEMENTS: WhoopBLE.entitlements
